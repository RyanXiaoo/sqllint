version: 2
project_name: sqllint
before:
  hooks:
    - go mod tidy
builds:
  - id: sqllint
    main: ./cmd/sqllint
    binary: sqllint
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
# release: owner/repo are auto-detected from the GITHUB_REPOSITORY of the
# Actions run, so they always match the repository the tag was pushed to.
