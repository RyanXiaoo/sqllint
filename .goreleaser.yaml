version: 2
project_name: sqllint
before:
  hooks:
    - go mod tidy
builds:
  - id: sqllint
    main: ./cmd/sqllint
    binary: sqllint
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
release:
  github:
    owner: ryanxiao
    name: go-sqllint
