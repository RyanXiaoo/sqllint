name: SQL Lint
on: [push, pull_request]
permissions:
  security-events: write
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build sqllint
        run: go build -o sqllint ./cmd/sqllint
      - name: Run sqllint
        run: ./sqllint --format sarif testdata/*.sql > results.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
