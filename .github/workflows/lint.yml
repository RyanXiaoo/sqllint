name: SQL Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run go-sqllint
        uses: ryanxiao/go-sqllint@main
        with:
          files: 'testdata/*.sql'
          format: 'sarif'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
